<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trello Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section id="auth-view" class="panel auth-panel">
      <h1>Trello Pro</h1>
      <p class="muted">Đăng nhập để quản lý các bảng công việc của bạn.</p>

      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Mật khẩu</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Đăng nhập</button>
      </form>
      <p class="auth-switch">
        Chưa có tài khoản?
        <button id="show-register" class="text-button" type="button">Đăng ký ngay</button>
      </p>

      <form id="register-form" class="hidden">
        <label for="register-email">Email</label>
        <input id="register-email" name="email" type="email" autocomplete="email" required>

        <label for="register-password">Mật khẩu</label>
        <input id="register-password" name="password" type="password" minlength="6" autocomplete="new-password" required>

        <label for="confirm-password">Nhập lại mật khẩu</label>
        <input id="confirm-password" name="confirmPassword" type="password" minlength="6" autocomplete="new-password" required>

        <button type="submit">Tạo tài khoản</button>
        <p class="auth-switch">
          Đã có tài khoản?
          <button id="show-login" class="text-button" type="button">Quay lại đăng nhập</button>
        </p>
      </form>
      <p id="auth-message" class="message" role="status"></p>
    </section>

    <section id="boards-view" class="hidden">
      <header class="page-header">
        <div>
          <h1>Bảng của tôi</h1>
          <p class="muted">Chọn một bảng để bắt đầu làm việc.</p>
        </div>
        <button id="logout-button" class="secondary" type="button">Đăng xuất</button>
      </header>

      <form id="board-form" class="inline-form panel">
        <input id="board-title" name="title" maxlength="255" placeholder="Tên bảng mới" required>
        <button type="submit">Tạo bảng</button>
      </form>
      <p id="boards-message" class="message" role="status"></p>
      <div id="boards" class="board-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
